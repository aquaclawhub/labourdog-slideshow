id: s5
layout: definition
title: "先有一个批次，\n再有这一批人。"
body:
  - "劳务狗狗把这件事拆成两个核心对象：支付批次与劳务人员。"
  - "这样拆开之后，很多原来混在一起的动作就有了明确边界。"
cards:
  - title: "支付批次"
    body: "对应一个项目、一个核算月份、一次支付。"
  - title: "劳务人员"
    body: "对应这一批次下的每一个人，包括主信息、结算信息、税务与导出信息。"
  - title: "分层处理"
    body: "D1、D2 按人处理；DQ、SQ、Y 按批次处理，各自回到合适的位置。"
animation: stagger
closing: "流程一旦分层，\n复杂度就会下降。"
